rabbitmq.host=${RABBITMQ_HOST:localhost}
rabbitmq.port=${RABBITMQ_PORT:5672}
rabbitmq.username=${RABBITMQ_USERNAME:admin}
rabbitmq.password=${RABBITMQ_PASSWORD:password123}
rabbitmq.virtual-host=${RABBITMQ_VHOST:/}
rabbitmq.queue-prefix=${RABBITMQ_QUEUE_PREFIX:room.}
rabbitmq.room-count=${RABBITMQ_ROOM_COUNT:20}
rabbitmq.prefetch=${RABBITMQ_PREFETCH:20}

consumer.worker-count=${CONSUMER_WORKER_COUNT:10}
consumer.server-endpoints=${CONSUMER_SERVER_ENDPOINTS:http://localhost:8080}
consumer.request-timeout-ms=${CONSUMER_REQUEST_TIMEOUT_MS:10000}
consumer.max-retries=${CONSUMER_MAX_RETRIES:2}
consumer.dedupe-ttl-ms=${CONSUMER_DEDUPE_TTL_MS:120000}

logging.level.root=INFO
logging.level.com.cs6650=INFO
