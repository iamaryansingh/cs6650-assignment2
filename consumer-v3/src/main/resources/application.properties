server.port=8090

rabbitmq.host=${RABBITMQ_HOST:localhost}
rabbitmq.port=${RABBITMQ_PORT:5672}
rabbitmq.username=${RABBITMQ_USERNAME:admin}
rabbitmq.password=${RABBITMQ_PASSWORD:password123}
rabbitmq.virtual-host=${RABBITMQ_VHOST:/}
rabbitmq.queue-prefix=${RABBITMQ_QUEUE_PREFIX:room.}
rabbitmq.room-count=${RABBITMQ_ROOM_COUNT:20}
rabbitmq.prefetch=${RABBITMQ_PREFETCH:20}

consumer.worker-count=${CONSUMER_WORKER_COUNT:10}
consumer.server-endpoints=${CONSUMER_SERVER_ENDPOINTS:http://localhost:8080}
consumer.request-timeout-ms=${CONSUMER_REQUEST_TIMEOUT_MS:10000}
consumer.max-retries=${CONSUMER_MAX_RETRIES:2}
consumer.dedupe-ttl-ms=${CONSUMER_DEDUPE_TTL_MS:120000}

consumer.batch.size=${CONSUMER_BATCH_SIZE:500}
consumer.flush.interval.ms=${CONSUMER_FLUSH_INTERVAL_MS:500}
consumer.write.max-retries=${CONSUMER_WRITE_MAX_RETRIES:3}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chatdb}
spring.datasource.username=${DB_USER:chatuser}
spring.datasource.password=${DB_PASSWORD:password123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.pool-name=ChatDBPool
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.show-sql=false

resilience4j.circuitbreaker.instances.databaseWriter.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.databaseWriter.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.databaseWriter.sliding-window-size=10
resilience4j.circuitbreaker.instances.databaseWriter.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.databaseWriter.permitted-number-of-calls-in-half-open-state=3

logging.level.root=INFO
logging.level.com.cs6650=INFO
logging.level.io.github.resilience4j=WARN
