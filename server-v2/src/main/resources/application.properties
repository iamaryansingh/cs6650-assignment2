server.port=8080

server.instance-id=${SERVER_INSTANCE_ID:${random.uuid}}

rabbitmq.host=${RABBITMQ_HOST:localhost}
rabbitmq.port=${RABBITMQ_PORT:5672}
rabbitmq.username=${RABBITMQ_USERNAME:admin}
rabbitmq.password=${RABBITMQ_PASSWORD:password123}
rabbitmq.virtual-host=${RABBITMQ_VHOST:/}
rabbitmq.exchange=${RABBITMQ_EXCHANGE:chat.exchange}
rabbitmq.queue-prefix=${RABBITMQ_QUEUE_PREFIX:room.}
rabbitmq.room-count=${RABBITMQ_ROOM_COUNT:20}
rabbitmq.channel-pool-size=${RABBITMQ_CHANNEL_POOL_SIZE:50}
rabbitmq.publisher-timeout-ms=${RABBITMQ_PUBLISHER_TIMEOUT_MS:5000}
rabbitmq.queue-message-ttl-ms=${RABBITMQ_QUEUE_MESSAGE_TTL_MS:120000}
rabbitmq.queue-max-length=${RABBITMQ_QUEUE_MAX_LENGTH:50000}

server.broadcast.dedupe-ttl-ms=120000
server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:80}
server.tomcat.threads.min-spare=${SERVER_TOMCAT_THREADS_MIN_SPARE:10}
server.tomcat.accept-count=${SERVER_TOMCAT_ACCEPT_COUNT:100}
logging.level.root=INFO
logging.level.com.cs6650=INFO

# ============================================================
# A3: PostgreSQL (read-only for Metrics API)
# ============================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chatdb}
spring.datasource.username=${DB_USER:chatuser}
spring.datasource.password=${DB_PASSWORD:password123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.pool-name=ServerReadPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
# Don't fail startup if DB is temporarily unreachable
spring.datasource.hikari.initialization-fail-timeout=0
